<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Queue</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; padding-top: 20vh; background-color: #f4f4f9; }
        .queue-box { background: white; padding: 50px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        h2 { color: #333; }
        h1 { font-size: 100px; margin: 10px 0; color: #007bff; }
    </style>
</head>
<body>
    <div class="queue-box">
        <h2>Currently Serving</h2>
        <h1 id="token-display">0</h1>
        <p>This screen updates automatically.</p>
    </div>

    <script>
        function fetchToken() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('token-display').innerText = data.token;
                })
                .catch(error => console.error('Error fetching token:', error));
        }

        setInterval(fetchToken, 3000); // Refreshes every 3 seconds
    </script>
</body>
</html>
